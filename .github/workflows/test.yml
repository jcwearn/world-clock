name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Verify lockfile is up to date
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json || (echo "package-lock.json is out of sync with package.json — run npm install" && exit 1)

      - run: npm ci

      - run: npm test

      - run: npm run build
